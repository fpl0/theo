---
# Every alert routes to the `noop` contact point until delivery is wired up.
# The mute time is kept so that when delivery returns, self-update windows
# are already excluded.
apiVersion: 1
policies:
  - orgId: 1
    receiver: noop
    group_by: [alertname]
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
muteTimes:
  - orgId: 1
    name: self-update-window
    time_intervals:
      - weekdays: ["saturday"]
        times:
          - start_time: "02:00"
            end_time: "03:00"

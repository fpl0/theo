---
apiVersion: 1
policies:
  - orgId: 1
    receiver: telegram
    group_by: [alertname]
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      - receiver: email
        group_by: [alertname]
        matchers:
          - severity = critical
        continue: true
      - receiver: telegram
        group_by: [alertname]
        matchers:
          - severity =~ "critical|warning"
muteTimes:
  - orgId: 1
    name: self-update-window
    time_intervals:
      - weekdays: ["saturday"]
        times:
          - start_time: "02:00"
            end_time: "03:00"

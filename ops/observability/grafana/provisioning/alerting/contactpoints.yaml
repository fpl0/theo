---
# Alert delivery is intentionally deferred. Alert rules still fire and are
# visible in Grafana's Alerting UI; they just don't escape the process.
#
# To enable delivery, replace this stub with a real contact point
# (telegram/email/webhook/slack/...) and route policies.yaml at it.
apiVersion: 1
contactPoints:
  - orgId: 1
    name: noop
    receivers:
      - uid: noop
        type: webhook
        disableResolveMessage: true
        settings:
          url: http://127.0.0.1:9/noop
          httpMethod: POST

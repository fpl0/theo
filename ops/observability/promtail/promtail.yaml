---
# Promtail tails the workspace logs directory into Loki.
#
# The plan's debug-drop guard (>7 days old debug stays on disk but never
# ships) is implemented via a drop stage.

server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: theo
    static_configs:
      - targets: [localhost]
        labels:
          job: theo
          __path__: /var/log/theo/theo-*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            component: component
            trace_id: traceId
            span_id: spanId
      - labels:
          level:
          component:
      - match:
          selector: '{level="debug"}'
          stages:
            # Drop debug older than 7d before shipping.
            - drop:
                older_than: 168h

services:
  postgres:
    image: pgvector/pgvector:0.8.2-pg17
    restart: unless-stopped
    command: >
      postgres
      -c shared_preload_libraries=pg_stat_statements
      -c pg_stat_statements.track=all
      -c effective_io_concurrency=200
      -c random_page_cost=1.1
      -c jit=off
      -c work_mem=16MB
      -c maintenance_work_mem=256MB
    environment:
      POSTGRES_USER: theo
      POSTGRES_PASSWORD: theo
      POSTGRES_DB: theo
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U theo"]
      interval: 5s
      timeout: 3s
      retries: 5

  openobserve:
    image: public.ecr.aws/zinclabs/openobserve:v0.70.0
    restart: unless-stopped
    environment:
      ZO_ROOT_USER_EMAIL: theo@theo.dev
      ZO_ROOT_USER_PASSWORD: theo
    ports:
      - "5080:5080"   # UI + OTLP HTTP
    volumes:
      - openobserve:/data

volumes:
  pgdata:
  openobserve:
